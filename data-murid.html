<!DOCTYPE html>
<html lang="id">
<head>
    <title>Data Kelas dan Murid</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --border: #e5e7eb;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            margin: 0; 
            padding: 20px; 
        }

        .container { max-width: 800px; margin: 0 auto; }

        h2 { font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--text-main); text-align: center; }
        h3 { font-size: 1.1rem; margin-top: 0; margin-bottom: 1rem; color: var(--text-main); border-bottom: 1px solid var(--border); padding-bottom: 10px; }

        /* Card Layout */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.875rem; color: var(--text-main); }
        
        input, select { 
            width: 100%; 
            padding: 10px 12px; 
            box-sizing: border-box; 
            border: 1px solid var(--border); 
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        /* Buttons */
        button { 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px; 
            background-color: var(--primary-color); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600;
            font-size: 14px;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover:not(:disabled) { background-color: var(--primary-hover); }
        button:disabled { background-color: #ccc; cursor: not-allowed; opacity: 0.7; }

        .delete-btn { background-color: var(--error); width: auto; padding: 6px 12px; font-size: 12px; }
        .delete-btn:hover:not(:disabled) { background-color: #dc2626; }
        
        .update-btn { background-color: var(--warning); color: #000; }
        .update-btn:hover:not(:disabled) { background-color: #d97706; }

        /* Message Box */
        .message { 
            padding: 12px; 
            margin-top: 12px; 
            border-radius: 8px; 
            display: none; 
            font-size: 14px; 
            font-weight: 500;
        }
        .success { background-color: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
        .error { background-color: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

        /* Table Style inside Card */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
        th { background-color: #f9fafb; font-weight: 600; color: var(--text-muted); text-transform: uppercase; font-size: 11px; letter-spacing: 0.05em; }
        
        /* Stats Display */
        .class-badge {
            display: inline-block;
            background: #e0e7ff;
            color: #3730a3;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
        }

        #mainContent:disabled { opacity: 0.5; pointer-events: none; }
    </style>
</head>

<body>

<div class="container">
    <h2>Data Kelas dan Murid</h2>

    <!-- KARTU 1: VERIFIKASI -->
    <div class="card" id="pinCard">
        <h3>PIN</h3>
        <div class="form-group">
            <label for="globalPinInput">PIN Akses</label>
            <input type="password" id="globalPinInput" placeholder="Masukkan PIN untuk memulai sesi">
        </div>
        <button id="verifyPinButton" onclick="verifyPin()">Verifikasi & Mulai Sesi</button>
        <div id="pinStatusMessage" class="message"></div>
    </div>

    <div id="mainContent">
        <!-- KARTU 2: SELEKSI KELAS -->
        <div class="card">
            <h3>Kelas</h3>
            <div class="form-group">
                <label for="kelasSelect">Pilih Unit Kelas</label>
                <select id="kelasSelect" onchange="loadDataByClass(this.value)" disabled>
                    <option value="">-- Muat & Pilih Kelas --</option>
                </select>
            </div>
        </div>

        <!-- KARTU 5: UPDATE TOTAL -->
        <div class="card">
            <h3>Banyak Murid Kelas <span id="kelasUpdateDisplay" class="class-badge">...</span></h3>
            <div id="dataKelasForm" style="font-size: 14px; color: var(--text-muted);">
                Pilih Kelas untuk mengatur banyak murid.
            </div>
            <div id="kelasUpdateMessage" class="message"></div>
        </div>

        <!-- KARTU 3: TAMBAH DATA -->
        <div class="card">
            <h3>Tambah Murid</h3>
            <div class="form-group">
                <label for="namaInput">Nama Lengkap</label>
                <input type="text" id="namaInput" placeholder="Contoh: Budi Santoso" disabled>
            </div>
            <button id="addStudentBtn" onclick="tambahData()" disabled>Simpan ke Database</button>
            <div id="tambahMessage" class="message"></div>
        </div>

        <!-- KARTU 4: DAFTAR MURID -->
        <div class="card">
            <h3>Daftar Murid Kelas <span id="selectedClassDisplay" class="class-badge">...</span></h3>
            <div class="table-container">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th style="width: 40px;">No</th>
                            <th>Nama Murid</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="dataBody">
                        <tr><td colspan="3" style="text-align:center; color: var(--text-muted);">Verifikasi PIN untuk memuat data.</td></tr>
                    </tbody>
                </table>
            </div>
            <div id="filterMessage" class="message"></div>
        </div>
    </div>
</div>

<script>
    const APP_URL_MURID_KELAS = "https://script.google.com/macros/s/AKfycbxKZb0_luWbi_hyK0J-z2nULpxEQBJ3nLX0BjcZdbu9TKDP9cK1YeSmzDYCiDgOPerS0A/exec"; 
    const SHEET_MURID = "DataMurid";
    const SHEET_KELAS = "DataKelas";

    function setFormControlsDisabled(isDisabled) {
        document.getElementById('kelasSelect').disabled = isDisabled;
        document.getElementById('namaInput').disabled = isDisabled;
        document.getElementById('addStudentBtn').disabled = isDisabled;
        
        document.querySelectorAll('.delete-btn').forEach(btn => btn.disabled = isDisabled);
        document.querySelectorAll('.update-btn').forEach(btn => btn.disabled = isDisabled);

        const totalInput = document.querySelector('#dataKelasForm input');
        if (totalInput) totalInput.disabled = isDisabled;
    }

    function getVerifiedPin() {
        const pin = sessionStorage.getItem('verifiedPIN');
        if (!pin) {
            setFormControlsDisabled(true); 
            displayMessage('pinStatusMessage', 'Sesi berakhir. Masukkan ulang PIN.', false);
            return null;
        }
        return pin;
    }

    async function verifyPin() {
        const pinInput = document.getElementById('globalPinInput');
        const pin = pinInput.value.trim();
        const verifyBtn = document.getElementById('verifyPinButton');
        
        if (!pin) {
            displayMessage('pinStatusMessage', 'Silakan masukkan PIN.', false);
            return;
        }
        
        displayMessage('pinStatusMessage', 'Memverifikasi...', false);
        verifyBtn.disabled = true;

        try {
            const response = await fetch(`${APP_URL_MURID_KELAS}?action=checkPin&PIN=${encodeURIComponent(pin)}`);
            const result = await response.json();

            if (result.success) {
                sessionStorage.setItem('verifiedPIN', pin); 
                displayMessage('pinStatusMessage', 'Verifikasi Berhasil!', true);
                setFormControlsDisabled(false); 
                pinInput.disabled = true;
                verifyBtn.style.display = 'none';
                loadClassDropdown(); 
            } else {
                displayMessage('pinStatusMessage', result.message, false);
                sessionStorage.removeItem('verifiedPIN');
            }
        } catch (e) {
            displayMessage('pinStatusMessage', 'Gagal terhubung ke server.', false);
        } finally {
            verifyBtn.disabled = false;
        }
    }

    function displayMessage(id, message, isSuccess) {
        const el = document.getElementById(id);
        el.innerText = message;
        el.className = `message ${isSuccess ? 'success' : 'error'}`;
        el.style.display = 'block';
        setTimeout(() => { el.style.display = 'none'; }, 5000);
    }

    function loadDataByClass(kelasFilterValue) {
        loadMuridData(kelasFilterValue); 
        loadDataKelas(kelasFilterValue); 
    }

    async function loadClassDropdown() {
        const selectElement = document.getElementById('kelasSelect');
        const isPinValid = !!sessionStorage.getItem('verifiedPIN');
        selectElement.innerHTML = '<option value="">-- Memuat Kelas... --</option>';

        try {
            const resMurid = await fetch(`${APP_URL_MURID_KELAS}?action=vars&sheetName=${SHEET_MURID}`);
            const dataMurid = await resMurid.json();
            
            if (dataMurid.error) {
                selectElement.innerHTML = '<option value="">Error Memuat Data</option>';
                return;
            }
            
            const uniqueClasses = [...new Set(dataMurid.map(item => item.Kelas).filter(k => k && k.trim() !== ''))];
            selectElement.innerHTML = '<option value="">-- Pilih Kelas --</option>';
            uniqueClasses.forEach(kelas => {
                const option = document.createElement('option');
                option.value = kelas;
                option.textContent = kelas;
                selectElement.appendChild(option);
            });

            document.getElementById('dataBody').innerHTML = '<tr><td colspan="3" style="text-align:center;">Pilih kelas untuk melihat daftar.</td></tr>';
        } catch (e) {
            selectElement.innerHTML = '<option value="">Gagal Terhubung</option>';
        }
    }

    async function loadDataKelas(kelasFilterValue) {
        const container = document.getElementById('dataKelasForm');
        const display = document.getElementById('kelasUpdateDisplay');
        const isPinValid = !!sessionStorage.getItem('verifiedPIN');

        display.textContent = kelasFilterValue || '...';
        if (!kelasFilterValue) {
            container.innerHTML = 'Pilih kelas di atas.';
            return;
        }

        container.innerHTML = 'Mengambil data banyak murid...';
        try {
            const res = await fetch(`${APP_URL_MURID_KELAS}?action=vars&sheetName=${SHEET_KELAS}&filterKey=Kelas&filterValue=${encodeURIComponent(kelasFilterValue)}`);
            const data = await res.json();

            let total = '0';
            const found = data.length > 0;
            if (found) total = data[0].TotalMurid || '0';

            container.innerHTML = `
                <div class="form-group">
                    <label>Banyak Murid</label>
                    <input type="number" id="totalInput" value="${total}" ${!isPinValid ? 'disabled' : ''}>
                </div>
                <button class="update-btn" onclick="updateDataKelas('${kelasFilterValue}')" ${!isPinValid ? 'disabled' : ''}>
                    ${found ? 'Perbarui Banyak Murid' : 'Simpan Data Baru'}
                </button>
            `;
        } catch (e) { container.innerHTML = 'Gagal memuat.'; }
    }

    async function updateDataKelas(kelas) {
        const total = document.getElementById('totalInput').value;
        const pin = getVerifiedPin();
        if(!pin) return;

        try {
            const payload = { PIN: pin, duplicateKeys: ["Kelas"], updateKeyOnDuplicate: "TotalMurid", items: [{ "Kelas": kelas, "TotalMurid": total }]};
            const response = await fetch(`${APP_URL_MURID_KELAS}?action=batchSubmit&sheetName=${SHEET_KELAS}`, { method: 'POST', body: JSON.stringify(payload) });
            const result = await response.json();
            displayMessage('kelasUpdateMessage', result.success ? 'Berhasil disimpan' : result.message, result.success);
        } catch (e) { displayMessage('kelasUpdateMessage', 'Error koneksi', false); }
    }

    async function tambahData() {
        const kelas = document.getElementById('kelasSelect').value;
        const nama = document.getElementById('namaInput').value.trim();
        const pin = getVerifiedPin();

        if(!kelas || !nama || !pin) {
            displayMessage('tambahMessage', 'Pilih kelas terlebih dahulu.', false);
            return;
        }

        try {
            const payload = { PIN: pin, items: [{ "Kelas": kelas, "Nama": nama }]};
            const res = await fetch(`${APP_URL_MURID_KELAS}?action=batchSubmit&sheetName=${SHEET_MURID}`, { method: 'POST', body: JSON.stringify(payload) });
            const result = await res.json();
            if(result.success) {
                document.getElementById('namaInput').value = '';
                displayMessage('tambahMessage', 'Data berhasil ditambahkan', true);
                loadMuridData(kelas);
            }
        } catch (e) { displayMessage('tambahMessage', 'Error koneksi', false); }
    }

    async function loadMuridData(kelas) {
        const body = document.getElementById('dataBody');
        const display = document.getElementById('selectedClassDisplay');
        display.textContent = kelas || '...';

        if(!kelas) return;
        body.innerHTML = '<tr><td colspan="3" style="text-align:center;">Memuat...</td></tr>';

        try {
            const res = await fetch(`${APP_URL_MURID_KELAS}?action=vars&sheetName=${SHEET_MURID}&filterKey=Kelas&filterValue=${encodeURIComponent(kelas)}`);
            const data = await res.json();
            body.innerHTML = '';

            if(data.length === 0) {
                body.innerHTML = '<tr><td colspan="3" style="text-align:center;">Belum ada murid di kelas ini.</td></tr>';
                return;
            }

            data.forEach((item, idx) => {
                const row = body.insertRow();
                row.insertCell().textContent = idx + 1;
                row.insertCell().textContent = item.Nama;
                const btn = document.createElement('button');
                btn.className = 'delete-btn';
                btn.textContent = 'Hapus';
                btn.onclick = () => deleteData(item.Kelas, item.Nama);
                row.insertCell().appendChild(btn);
            });
        } catch (e) { body.innerHTML = '<tr><td colspan="3">Error data.</td></tr>'; }
    }

    async function deleteData(kelas, nama) {
        if(!confirm(`Hapus ${nama}?`)) return;
        const pin = getVerifiedPin();
        try {
            const payload = { PIN: pin, sheetName: SHEET_MURID, keys: { "Kelas": kelas, "Nama": nama }};
            const res = await fetch(`${APP_URL_MURID_KELAS}?action=deleteData`, { method: 'POST', body: JSON.stringify(payload) });
            const result = await res.json();
            if(result.success) {
                displayMessage('filterMessage', 'Data dihapus', true);
                loadMuridData(kelas);
            }
        } catch (e) { displayMessage('filterMessage', 'Error koneksi', false); }
    }

    document.addEventListener('DOMContentLoaded', () => {
        setFormControlsDisabled(true);
        const stored = sessionStorage.getItem('verifiedPIN');
        if (stored) {
            document.getElementById('globalPinInput').value = stored;
            verifyPin();
        }
    });
</script>
</body>
</html>
